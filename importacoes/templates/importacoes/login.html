{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso — ERP Retaguarda</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-card__logo">
      <div class="login-card__logo-icon">🍽️</div>
      <div class="login-card__title">ERP Retaguarda</div>
      <div class="login-card__sub">Gestão de Bares e Restaurantes</div>
    </div>

    {% if form.errors %}
      <div class="alert alert--error" style="margin-bottom: 16px;">
        <span class="alert__icon">❌</span>
        <div class="alert__body">Usuário ou senha incorretos. Tente novamente.</div>
      </div>
    {% endif %}

    <form method="POST" class="login-card__form">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Usuário</label>
        <input type="text" name="username" class="form-control" placeholder="seu.usuario" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn--primary btn--block btn--lg" data-no-loading="true">
        Entrar no sistema
      </button>
    </form>

    <div class="login-card__footer">ERP Retaguarda &copy; 2026</div>
  </div>

  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
