{% extends 'importacoes/base.html' %}

{% block content %}
    <h2 style="color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px;">📤 Importar Arquivos</h2>
    <p>Selecione o sistema e faça o upload da planilha correspondente.</p>
    
    {% if messages %}
        <ul style="list-style: none; padding: 0;">
            {% for message in messages %}
                <li style="padding: 12px; margin-bottom: 15px; border-radius: 4px; font-weight: bold;
                    {% if message.tags == 'success' %}background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;
                    {% elif message.tags == 'error' %}background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;
                    {% else %}background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb;{% endif %}">
                    {{ message }}
                </li>
            {% endfor %}
        </ul>
    {% endif %}

    <form method="POST" enctype="multipart/form-data" style="margin-top: 20px; background: #f8f9fa; padding: 25px; border-radius: 8px; border: 1px solid #e0e0e0; max-width: 500px;">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn-primary btn-success" style="width: 100%; margin-top: 10px;">⏳ Iniciar Importação</button>
    </form>
{% endblock %}
